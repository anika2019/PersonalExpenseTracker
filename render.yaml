services:
  - type: web
    name: expense-tracker-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      # Set this in Render dashboard (recommended) instead of committing secrets:
      # - key: DATABASE_URL
      #   sync: false
